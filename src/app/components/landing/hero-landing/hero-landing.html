<section id="inicio" class="relative min-h-screen bg-cover bg-center bg-no-repeat" style="
    background-image:
      linear-gradient(to right, rgba(0,0,0,.75), rgba(0,0,0,.2)),
      url('/img/landing/hero/hero3.jpg');
  ">

  <header class="w-full bg-black/70 backdrop-blur-md fixed top-0 left-0 z-50 border-b-2 border-secondary animate-on-load animate-fade-in-down">
    <div class="px-6 py-3 mx-auto max-w-screen-xl flex items-center justify-between">

      <a routerLink="/" fragment="inicio" class="flex items-center animate-on-load animate-slide-in-left" style="animation-delay: 0s;">
        <img src="/img/logo.png" alt="Logo" class="h-8 w-auto">
      </a>

      <nav class="hidden lg:flex items-center gap-10 font-sans">

        <ul class="flex items-center gap-8 text-sm font-medium text-white">
          <li class="animate-on-load animate-fade-in-down" style="animation-delay: 0.1s;">
            <a routerLink="/store"
              class="relative transition hover:text-secondary after:absolute after:left-0 after:-bottom-1 after:h-0.5 after:w-0 after:bg-secondary after:transition-all hover:after:w-full">
              Tienda
            </a>
          </li>
          <li class="animate-on-load animate-fade-in-down" style="animation-delay: 0.2s;">
            <a [routerLink]="[]" fragment="historia"
              class="relative transition hover:text-secondary after:absolute after:left-0 after:-bottom-1 after:h-0.5 after:w-0 after:bg-secondary after:transition-all hover:after:w-full">
              Nuestra Historia
            </a>
          </li>
          <li class="animate-on-load animate-fade-in-down" style="animation-delay: 0.3s;">
            <a [routerLink]="[]" fragment="destacados"
              class="relative transition hover:text-secondary after:absolute after:left-0 after:-bottom-1 after:h-0.5 after:w-0 after:bg-secondary after:transition-all hover:after:w-full">
              Vinos de Berries
            </a>
          </li>
          <li class="animate-on-load animate-fade-in-down" style="animation-delay: 0.4s;">
            <a [routerLink]="[]" fragment="colecciones"
              class="relative transition hover:text-secondary after:absolute after:left-0 after:-bottom-1 after:h-0.5 after:w-0 after:bg-secondary after:transition-all hover:after:w-full">
              Experiencias
            </a>
          </li>
        </ul>

        <div class="flex items-center gap-4">
          <button class="text-white text-lg transition hover:text-secondary animate-on-load animate-fade-in-down"
                  style="animation-delay: 0.5s;">
            <i class="bi bi-cart3"></i>
          </button>

          <a href="/"
            class="px-4 py-1.5 text-sm border border-secondary text-secondary rounded transition hover:bg-secondary hover:text-white animate-on-load animate-fade-in-down"
            style="animation-delay: 0.6s;">
            Iniciar Sesión
          </a>

          <a href="/"
            class="px-4 py-1.5 text-sm rounded bg-secondary text-white transition hover:opacity-85 animate-on-load animate-fade-in-down"
            style="animation-delay: 0.7s;">
            Crear cuenta
          </a>
        </div>
      </nav>

      <button class="lg:hidden text-white animate-on-load animate-fade-in-down" style="animation-delay: 0.8s;">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
          <path d="M23,13H1a1,1,0,0,1,0-2H23a1,1,0,0,1,0,2Z" />
          <path d="M23,6H1A1,1,0,0,1,1,4H23a1,1,0,0,1,0,2Z" />
          <path d="M23,20H1a1,1,0,0,1,0-2H23a1,1,0,0,1,0,2Z" />
        </svg>
      </button>

    </div>
  </header>

  <div class="min-h-screen bg-black/50 flex items-center pt-20">
    <div class="w-full px-6 mx-auto max-w-screen-xl lg:px-20">

      <div class="max-w-3xl text-center lg:text-left">

        <p
          class="inline-block px-5 py-1.5 mb-6 text-base font-bold tracking-widest text-white uppercase rounded bg-secondary animate-on-load animate-slide-in-right"
          style="animation-delay: 0.9s;">
          VINOS CITADEL
        </p>

        <h1 class="text-5xl sm:text-6xl lg:text-7xl font-extrabold leading-tight text-white">
          <span class="animate-on-load animate-fade-in-up block" style="animation-delay: 1.0s;">
            EL ARTE DEL
          </span>
          <span class="block text-secondary animate-on-load animate-fade-in-up" style="animation-delay: 1.2s;">
            VINO DE BERRIES
          </span>
        </h1>

        <p class="mt-8 text-lg sm:text-xl text-gray-200 max-w-2xl lg:max-w-none leading-relaxed animate-on-load animate-fade-in-up"
           style="animation-delay: 1.4s;">
          Descubre nuestros vinos de berries, elaborados artesanalmente en Trujillo con frutos seleccionados,
inspirados en la tradición y la riqueza cultural del Perú.
        </p>

        <div class="mt-10 flex flex-col sm:flex-row gap-6 sm:justify-center lg:justify-start">
          <button
            class="h-14 px-10 text-xl font-semibold text-white rounded-lg bg-secondary transition hover:opacity-90 animate-on-load animate-fade-in-up"
            style="animation-delay: 1.6s;">
            Ver Productos
          </button>

          <button
            class="h-14 px-10 text-xl font-semibold text-secondary border-2 border-secondary rounded-lg transition hover:bg-secondary hover:text-white animate-on-load animate-fade-in-up "
            style="animation-delay: 1.8s;">
            Iniciar Sesión
          </button>
        </div>

      </div>
    </div>
  </div>

</section>
