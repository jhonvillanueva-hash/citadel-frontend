@if (visible) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm transition-opacity duration-300">

    <div class="w-full max-w-md mx-4 bg-white rounded-2xl shadow-2xl p-6 text-center relative
                transform transition-all duration-300 scale-95 opacity-0 animate-[fadeInScale_0.3s_forwards]">

      <div class="flex justify-center mb-4">
        <fa-icon [icon]="icons.faQuestionCircle" class="text-yellow-500 text-5xl drop-shadow-sm" />
      </div>

      <p class="text-gray-800 text-lg font-medium mb-6 leading-relaxed">
        {{ message }}
      </p>

      <div class="flex justify-end gap-3">
        <button 
          (click)="cancel()" 
          class="px-5 py-2.5 rounded-xl bg-gray-100 text-gray-700 font-medium
                 hover:bg-gray-200 hover:scale-[1.02]
                 active:scale-95 transition-all duration-200 shadow-sm">
          Cancelar
        </button>

        <button 
          (click)="confirm()" 
          class="px-5 py-2.5 rounded-xl bg-[var(--admin-bg-aside)] text-white font-semibold
                 hover:brightness-90 hover:scale-[1.02]
                 active:scale-95 transition-all duration-200 shadow-md">
          Confirmar
        </button>
      </div>

    </div>
  </div>
}
