<div class="min-h-screen bg-white">

  @if (hasResults()) {
    <app-product
      [customTitle]="'Resultados para: ' + searchTerm()"
      [customProducts]="results()">
    </app-product>
  } @else if (searchTerm()) {
    <div class="flex flex-col items-center justify-center py-24 px-6 text-center">

      <div class="w-20 h-20 rounded-full bg-slate-100 flex items-center justify-center mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-9 h-9 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
      </div>

      <h2 class="text-xl font-semibold text-slate-800 mb-2">
        Sin resultados para
        <span class="text-[#c35b64]">"{{ searchTerm() }}"</span>
      </h2>

      <p class="text-slate-500 text-sm max-w-xs">
        No encontramos vinos que coincidan con tu búsqueda. Intenta con otro nombre, sabor o descripción.
      </p>

      <div class="mt-8 flex flex-col sm:flex-row gap-3">
          <a routerLink="/store"
          class="px-6 py-2.5 text-sm border border-slate-300 text-slate-700 hover:border-[#c35b64] hover:text-[#c35b64] transition">
            Ver todos los vinos
          </a>
      </div>

    </div>
  }

</div>
