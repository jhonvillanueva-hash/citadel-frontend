<div class="py-4 mx-auto lg:max-w-6xl md:max-w-4xl max-w-md sm:max-w-xl">
  <h2 class="text-2xl sm:text-3xl font-bold text-slate-900 text-center mb-10">
    Presentaciones
  </h2>

  <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 sm:gap-6">

    @for (category of internalCategories; track trackById($index, category)) {

      <div
        class="bg-gray-100 p-3 group overflow-hidden cursor-pointer relative z-50
               hover:before:bg-black before:absolute before:inset-0
               before:opacity-20 before:transition-all"
      >

        <div class="w-full aspect-[41/50] overflow-hidden relative">
          <img
            [src]="category.img"
            [alt]="category.name"
            class="h-full w-full object-cover
                   group-hover:scale-105 transition-transform duration-300"
          />

          <!-- MOBILE -->
          <div
            class="sm:hidden absolute bottom-0 left-0 right-0
                   bg-gradient-to-t from-black/70 to-transparent p-3"
          >
            <h3 class="text-white text-base font-bold truncate">
              {{ category.name }}
            </h3>
            <p class="text-white text-xs">
              {{ category.amount }} productos
            </p>
          </div>

          <!-- DESKTOP HOVER -->
          <div
            class="absolute inset-0 flex flex-col items-center justify-center
                   p-3 sm:p-4 opacity-0 group-hover:opacity-100
                   transition-all duration-300 sm:translate-y-8
                   group-hover:translate-y-0"
          >
            <div class="absolute inset-0 bg-black/40"></div>

            <div
              class="relative z-10 text-center transform
                     sm:translate-y-4 group-hover:translate-y-0
                     transition-transform duration-300 delay-100"
            >
              <h3 class="text-white text-lg sm:text-xl md:text-2xl font-bold mb-1">
                {{ category.name }}
              </h3>
              <p class="text-white text-xs sm:text-sm md:text-base mb-4">
                {{ category.amount }} productos
              </p>
            </div>

            <span
              class="relative z-10 bg-white text-gray-900
                     px-4 sm:px-6 py-1.5 sm:py-2 font-medium
                     text-xs sm:text-sm md:text-base
                     transform sm:translate-y-6
                     group-hover:translate-y-0
                     transition-transform duration-300 delay-150"
            >
              Ver más
            </span>
          </div>

        </div>
      </div>

    }

  </div>
</div>
