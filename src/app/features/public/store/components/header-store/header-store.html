<header class="shadow-lg relative z-50">

  <div
    class="flex items-center gap-4 px-4 lg:px-10 h-[60px] lg:h-[70px] bg-[#202125]">

    <a routerLink="/store" class="shrink-0">
      <img src="/img/logo.png" alt="Logo" class="h-8">
    </a>

    <input
      type="text"
      placeholder="Buscar..."
      class="hidden md:block lg:w-80 bg-transparent border border-white/90 px-4 h-10 rounded text-sm text-white placeholder:text-white/50 outline-none focus:border-white/60 transition">

    <div class="ml-auto flex items-center gap-4 text-white">
      <button (click)="openCart()" class="relative text-xl hover:text-[#c35b64] transition">
        <fa-icon [icon]="icons.faCartShopping"/>
        <span
          class="absolute -top-2 -right-2 bg-[#c35b64] text-white text-xs rounded-full px-1 min-w-[18px] text-center">
          {{ cartCount() }}
        </span>
      </button>

      @if (currentUser()) {
        <div class="hidden lg:flex gap-2">
          @if (currentUser()?.tipo === 'A') {
            <button
              routerLink="/admin"
              class="px-4 py-2 text-sm border border-white text-white hover:bg-[#c35b64] hover:border-[#c35b64] transition">
              Panel Admin
            </button>
          } @else {
            <button
              routerLink="/store/profile"
              class="text-xl hover:text-[#c35b64] transition"
              title="Mi Cuenta">
              <fa-icon [icon]="icons.faUser"/>
            </button>
          }
        </div>
      } @else {
        <div class="hidden lg:flex gap-2">
          <button
            routerLink="/login"
            class="px-4 py-2 text-sm border border-white text-white hover:bg-[#c35b64] hover:border-[#c35b64] transition">
            Iniciar sesión
          </button>
          <button
            routerLink="/register"
            class="px-4 py-2 text-sm border border-white text-white hover:bg-[#c35b64] hover:border-[#c35b64] transition">
            Registrarse
          </button>
        </div>
      }

      <button class="lg:hidden text-white text-2xl hover:text-[#c35b64] transition">
        <fa-icon [icon]="icons.faList"/>
      </button>
    </div>
  </div>

  <nav class="bg-[#0e0d12]">
    <ul class="hidden lg:flex justify-center gap-6 py-3 text-sm">

      @if (isLoading()) {
        <li class="text-white/50">Cargando...</li>
      } @else {
        @for (nav of internalNavs(); track trackById($index, nav)) {
          <li>
            <a
              [routerLink]="nav.id
                ? ['/store/products/flavors', generarSlug(nav.name), nav.id]
                : ['/store/products/flavors', generarSlug(nav.name)]"
              class="text-white hover:text-[#c35b64] transition">
              {{ nav.name }}
            </a>
          </li>
        }
      }

    </ul>
  </nav>

</header>
