<div class="bg-white p-4 mx-auto max-w-[1400px]">

  <h2 class="text-xl sm:text-3xl font-bold text-slate-900 mb-6 sm:mb-8">
    Lista de Vinos
  </h2>

  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6">

    @for (wine of products; track trackById($index, wine)) {

      <div class="group overflow-hidden relative">

        <a href="#" class="block">
          <div class="aspect-[3/4] bg-slate-100 w-full overflow-hidden relative">

            <!-- ================= ETIQUETAS SUPERIORES ================= -->
            <div class="absolute top-3 left-3 z-20 flex flex-col gap-2">

              <!-- CATEGORÍA -->
              @if (wine.iconoCategory) {
                <div
                  class="bg-white/90 backdrop-blur
                         rounded-full
                         h-7 w-7
                         group-hover:w-[90px]
                         px-2
                         flex items-center
                         overflow-hidden
                         transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)]"
                >
                  <img
                    [src]="wine.iconoCategory"
                    [alt]="wine.category"
                    class="w-3 h-3 mr-2 flex-shrink-0"
                  />
                  <span
                    class="text-xs font-medium text-slate-700 whitespace-nowrap
                           opacity-0
                           group-hover:opacity-100
                           transition-opacity duration-500 delay-75"
                  >
                    {{ wine.category }}
                  </span>
                </div>
              }

              <!-- FLAVOR -->
              @if (wine.iconoFlavor) {
                <div
                  class="bg-white/90 backdrop-blur
                         rounded-full
                         h-7 w-7
                         group-hover:w-[110px]
                         px-2
                         flex items-center
                         overflow-hidden
                         transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)]"
                >
                  <img
                    [src]="wine.iconoFlavor"
                    [alt]="wine.flavor"
                    class="w-3 h-3 mr-2 flex-shrink-0"
                  />
                  <span
                    class="text-xs font-medium text-slate-700 whitespace-nowrap
                           opacity-0
                           group-hover:opacity-100
                           transition-opacity duration-500 delay-75"
                  >
                    {{ wine.flavor }}
                  </span>
                </div>
              }

            </div>
            <!-- ========================================================= -->

            <img
              [src]="wine.image"
              [alt]="wine.name"
              class="w-full h-full object-cover object-top
                     hover:scale-110 transition-all duration-700"
            />
          </div>
        </a>

        <!-- ================= INFO + ACCIONES ================= -->
        <div class="p-4 relative">

          <!-- BOTONES HOVER -->
          <div
            class="flex justify-between gap-2 w-full absolute px-4 pt-3 z-10
                   transition-all duration-500 ease-in-out
                   left-0 right-0
                   group-hover:bottom-20
                   lg:bottom-5 lg:opacity-0 lg:bg-white
                   lg:group-hover:opacity-100
                   max-lg:bottom-20 max-lg:py-3 max-lg:bg-white/60"
          >
            <button class="bg-transparent border-0 cursor-pointer">
              <i class="bi bi-heart-fill text-[#515255] text-[18px]"></i>
            </button>

            <button class="bg-transparent border-0 cursor-pointer">
              <i class="bi bi-cart-fill text-[#515255] text-[18px]"></i>
            </button>
          </div>

          <!-- TEXTO -->
          <div class="z-20 relative bg-white">
            <h6 class="text-[15px] font-semibold text-slate-900 truncate">
              {{ wine.name }}
            </h6>
            <h6 class="text-sm text-slate-600 font-medium mt-2">
              {{ wine.volumen }}
            </h6>
          </div>

        </div>
        <!-- ================================================ -->

      </div>

    }

  </div>
</div>
