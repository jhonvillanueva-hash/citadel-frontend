<div class="py-4 px-4 sm:px-6 mx-auto lg:max-w-6xl md:max-w-4xl">
  <h2 class="text-2xl sm:text-3xl font-bold text-slate-900 text-center mb-6 sm:mb-10">
    Dulzores
  </h2>

  @if (isLoading()) {
    <div class="flex justify-center items-center py-12">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-secondary"></div>
    </div>
  } @else {
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 sm:gap-4 lg:gap-6">

      @for (category of internalCategories(); track trackById($index, category)) {
        <div
          class="group bg-[#202125] overflow-hidden cursor-pointer transition-all duration-300
                 sm:hover:bg-[#c35b64]"
          [routerLink]="['/store/products/sweetness', generarSlug(category.name), category.id]"
        >
          <div class="p-4 sm:p-6 text-center">
            <h3 class="text-white text-base sm:text-lg lg:text-xl font-bold mb-1 sm:mb-2">
              {{ category.name }}
            </h3>
            <p class="text-gray-300 text-xs sm:text-sm sm:group-hover:text-white transition">
              {{ category.amount }} {{ category.amount === 1 ? 'producto' : 'productos' }}
            </p>

            <span
              class="inline-block mt-3 sm:mt-4 bg-secondary text-white px-3 sm:px-4 py-1 sm:py-1.5 text-xs sm:text-sm
                     sm:opacity-0 sm:group-hover:opacity-100 transition-all duration-300
                     sm:transform sm:group-hover:translate-y-0 sm:translate-y-2
                     sm:group-hover:bg-white sm:group-hover:text-secondary"
            >
              Ver más
            </span>
          </div>
        </div>
      }

    </div>
  }
</div>
