<div class="relative w-full overflow-hidden group"
     (mouseenter)="pause()"
     (mouseleave)="resume()">

  <!-- Contenedor de slides con relación de aspecto 5:2 (40%) -->
  <div class="relative w-full" style="padding-top: 40%;">
    @for (img of images; track img; let i = $index) {
      <div class="absolute top-0 left-0 w-full h-full transition-opacity duration-700 ease-in-out"
           [class.opacity-0]="currentIndex !== i"
           [class.opacity-100]="currentIndex === i"
           [class.z-10]="currentIndex === i">
        <img [src]="img"
             [alt]="'Slide ' + (i + 1)"
             class="w-full h-full object-cover">
      </div>
    }
  </div>

  <!-- Botones de navegación -->
  @if (images.length > 1) {
    <!-- Botón anterior -->
    <button (click)="prev()"
            class="absolute left-4 top-1/2 -translate-y-1/2 z-20
                   bg-black/40 hover:bg-black/60 text-white
                   w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center
                   transition-all duration-300 backdrop-blur-sm shadow-lg"
            aria-label="Slide anterior">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>

    <!-- Botón siguiente -->
    <button (click)="next()"
            class="absolute right-4 top-1/2 -translate-y-1/2 z-20
                   bg-black/40 hover:bg-black/60 text-white
                   w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center
                   transition-all duration-300 backdrop-blur-sm shadow-lg"
            aria-label="Slide siguiente">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
      </svg>
    </button>

    <!-- Indicadores de slides -->
    <div class="absolute bottom-4 left-1/2 -translate-x-1/2 z-20 flex gap-2">
      @for (img of images; track img; let i = $index) {
        <button
          (click)="goToSlide(i)"
          class="w-2.5 h-2.5 rounded-full transition-all duration-300 hover:scale-125"
          [class.bg-white]="currentIndex === i"
          [class.bg-white/60]="currentIndex !== i"
          [class.w-6]="currentIndex === i"
          aria-label="Ir al slide {{ i + 1 }}">
        </button>
      }
    </div>
  }
</div>
