<div class="bg-admin-pink-light bg-opacity-30 rounded-xl p-5 sm:p-8">
  <h3 class="text-xl font-bold text-admin-brown mb-6 flex items-center gap-2">
    <span class="w-1.5 h-6 bg-admin-pink rounded-full"></span>
    Galería de Imágenes
  </h3>

  <div class="space-y-10">
    <div>
      <label class="block text-base font-bold text-admin-brown-light mb-3">Imagen Principal</label>
      <div class="rounded-2xl overflow-hidden border-2 border-admin-pink/40 bg-white shadow-sm">
        <div class="w-full h-64 sm:h-80 md:h-96 bg-gray-50 flex items-center justify-center relative">
          @if (facade.principalImage().preview) {
            <img [src]="facade.principalImage().preview" class="w-full h-full object-cover">
          } @else {
            <span class="text-gray-400">Sin imagen principal</span>
          }
        </div>
        <div class="p-4 border-t bg-white">
          <input type="file" (change)="onPrincipalChange($event)" accept="image/*" 
            class="block w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-admin-pink file:text-white">
        </div>
      </div>
    </div>
<div>
  <label class="block text-base font-bold text-admin-brown-light mb-4">Imágenes Adicionales</label>
  <div class="grid grid-cols-1 xs:grid-cols-2 sm:grid-cols-3 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
    @for (img of facade.additionalImages(); track $index) {
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden relative group">
        <div class="aspect-square bg-gray-50 flex items-center justify-center relative overflow-hidden">
          @if (img.preview) {
            <img [src]="img.preview" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-110">
            <button (click)="facade.removeImageRow($index)" 
              class="absolute top-2 right-2 bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center shadow-lg hover:bg-red-600 transition-colors z-10">
              ×
            </button>
          } @else {
            <div class="flex flex-col items-center gap-2 text-gray-400">
              <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
              </svg>
              <span class="text-xs font-medium">Añadir imagen</span>
            </div>
          }
        </div>
        <div class="p-3 bg-gray-50 border-t">
          <input type="file" (change)="onAdditionalChange($event, $index)" accept="image/*" 
            class="text-[10px] w-full file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-[10px] file:bg-admin-pink file:text-white">
        </div>
      </div>
    }
  </div>
</div>
  </div>
</div>
