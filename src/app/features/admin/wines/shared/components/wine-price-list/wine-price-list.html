<div class="bg-admin-pink-light bg-opacity-30 rounded-xl p-5 mb-5">
  <h3 class="text-lg font-semibold text-admin-brown mb-4 flex items-center gap-2">
    <span class="w-1 h-6 bg-admin-pink rounded-full"></span>
    Precios
  </h3>

  <div class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-admin-brown-light mb-1">Precio base</label>
      <input
        class="w-full px-4 py-2 rounded-lg border border-gray-200 outline-none focus:border-admin-pink"
        type="number" [ngModel]="facade.basePrice()" (ngModelChange)="facade.basePrice.set($event)" placeholder="Precio base por unidad">
    </div>

    <div>
      <div class="flex flex-wrap items-center justify-between gap-3 mb-3">
        <p class="text-sm font-medium text-admin-brown-light">Precios por cantidad</p>
        <button type="button" (click)="addPriceRow()"
          class="px-3 py-1.5 rounded-lg bg-admin-pink text-white hover:bg-admin-pink-dark transition-all text-sm">
          + Añadir fila
        </button>
      </div>

      <div class="space-y-3 max-h-64 overflow-y-auto pr-1">
        @for (precio of facade.priceRows(); track $index) {
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 items-end border-b border-gray-100 sm:border-0 pb-3 sm:pb-0">
            <div class="flex flex-col">
              <span class="text-[10px] text-admin-brown-light sm:hidden mb-1 uppercase font-bold">Cajas</span>
              <input class="w-full px-4 py-2 rounded-lg border border-gray-200 outline-none"
                type="number" [(ngModel)]="precio.cantidad" placeholder="Cajas">
            </div>
            <div class="flex flex-col">
              <span class="text-[10px] text-admin-brown-light sm:hidden mb-1 uppercase font-bold">Precio (S/.)</span>
              <input class="w-full px-4 py-2 rounded-lg border border-gray-200 outline-none"
                type="number" [(ngModel)]="precio.precio" placeholder="Precio (S/.)">
            </div>
            <button type="button" (click)="removePriceRow($index)"
              class="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition-all py-2 rounded-lg text-sm font-medium">
              Eliminar
            </button>
          </div>
        }
      </div>
    </div>
  </div>
</div>
